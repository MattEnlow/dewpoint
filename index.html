<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dewpoint Forecast</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f7fa;
    --surface: #ffffff;
    --surface2: #eef1f5;
    --text: #1a1d23;
    --text2: #5a6070;
    --text3: #9099a8;
    --border: rgba(0,0,0,0.1);
    --blue: #185FA5;
    --radius: 10px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #13151a;
      --surface: #1e2128;
      --surface2: #282c35;
      --text: #e8eaf0;
      --text2: #9099a8;
      --text3: #5a6070;
      --border: rgba(255,255,255,0.08);
      --blue: #85B7EB;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .container { max-width: 780px; margin: 0 auto; }

  header { margin-bottom: 1.5rem; }
  header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
  header p { font-size: 13px; color: var(--text3); margin-top: 4px; }

  /* Controls bar */
  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }

  .zip-input {
    font-size: 14px;
    font-family: inherit;
    padding: 7px 11px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text);
    width: 110px;
    letter-spacing: 0.05em;
  }
  .zip-input:focus { outline: 2px solid var(--blue); outline-offset: 1px; }
  .zip-input::placeholder { color: var(--text3); letter-spacing: normal; }

  .go-btn {
    font-size: 13px;
    font-family: inherit;
    color: #fff;
    background: var(--blue);
    border: none;
    border-radius: 6px;
    padding: 7px 16px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .go-btn:hover { opacity: 0.85; }

  .divider {
    width: 1px;
    height: 22px;
    background: var(--border);
    margin: 0 4px;
  }

  .check-label {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    user-select: none;
  }
  .check-label input[type=checkbox] {
    width: 15px;
    height: 15px;
    accent-color: var(--blue);
    cursor: pointer;
  }
  .temp-swatch {
    display: inline-block;
    width: 22px;
    height: 3px;
    border-radius: 2px;
    background: rgba(185,60,40,0.55);
    vertical-align: middle;
    margin-left: 2px;
  }

  /* Chart */
  .chart-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1rem 1rem;
    margin-bottom: 1.5rem;
  }
  .chart-inner { position: relative; width: 100%; height: 260px; }

  /* Table */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text3); text-align: left; padding: 10px 14px;
    border-bottom: 1px solid var(--border); background: var(--surface2);
  }
  tbody td { padding: 8px 14px; border-bottom: 1px solid var(--border); color: var(--text); }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--surface2); }

  .badge {
    display: inline-block; font-size: 11px; font-weight: 500;
    padding: 2px 8px; border-radius: 20px;
  }

  /* Footer */
  .footer {
    margin-top: 1.5rem; display: flex; align-items: center;
    justify-content: space-between; flex-wrap: wrap; gap: 8px;
  }
  .footer-note { font-size: 12px; color: var(--text3); }

  button.refresh-btn {
    font-size: 13px; font-family: inherit; color: var(--blue);
    background: none; border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 14px; cursor: pointer; transition: background 0.15s;
  }
  button.refresh-btn:hover { background: var(--surface2); }

  #status {
    font-size: 14px; color: var(--text2);
    padding: 2rem 0; text-align: center;
  }
  #zip-error { font-size: 12px; color: #b91c1c; margin-top: 4px; min-height: 16px; }

  .hidden { display: none; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Dewpoint forecast</h1>
    <p id="updated">Enter a ZIP code to get started.</p>
  </header>

  <div class="controls">
    <input class="zip-input" id="zip-input" type="text" inputmode="numeric"
           maxlength="5" placeholder="ZIP code" value="02067"
           onkeydown="if(event.key==='Enter') goZip()">
    <button class="go-btn" onclick="goZip()">Go</button>
    <div class="divider"></div>
    <label class="check-label">
      <input type="checkbox" id="show-temp" checked onchange="toggleTemp()">
      Show temperature <span class="temp-swatch"></span>
    </label>
  </div>
  <div id="zip-error"></div>

  <div id="status" class="hidden"></div>

  <div id="chart-wrap" class="chart-wrap hidden">
    <div class="chart-inner">
      <canvas id="chart" role="img" aria-label="Hourly dewpoint forecast chart"></canvas>
    </div>
  </div>

  <div id="table-wrap" class="table-wrap hidden">
    <table>
      <thead>
        <tr><th>Day</th><th>Time</th><th>Dewpoint</th><th>Comfort</th></tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="footer">
    <span class="footer-note" id="footer-note">Data: NOAA / National Weather Service</span>
    <button class="refresh-btn" onclick="refresh()">↻ Refresh</button>
  </div>
</div>

<script>
let chartInst = null;
let lastLat = null, lastLon = null, lastLocation = '';

function cToF(c) { return Math.round(c * 9 / 5 + 32); }

function comfort(dp) {
  if (dp < 50) return { label: 'Dry',         bg: '#dbeafe', color: '#1e40af' };
  if (dp < 60) return { label: 'Comfortable', bg: '#dcfce7', color: '#166534' };
  if (dp < 65) return { label: 'Noticeable',  bg: '#fef9c3', color: '#854d0e' };
  if (dp < 70) return { label: 'Humid',       bg: '#ffedd5', color: '#9a3412' };
  return             { label: 'Oppressive',   bg: '#fee2e2', color: '#991b1b' };
}

function setError(msg) {
  document.getElementById('zip-error').textContent = msg;
}

async function goZip() {
  setError('');
  const zip = document.getElementById('zip-input').value.trim();
  if (!/^\d{5}$/.test(zip)) { setError('Please enter a 5-digit ZIP code.'); return; }

  document.getElementById('status').textContent = 'Looking up ZIP code…';
  document.getElementById('status').classList.remove('hidden');
  ['chart-wrap','table-wrap'].forEach(id => document.getElementById(id).classList.add('hidden'));
  document.getElementById('updated').textContent = 'Loading…';

  try {
    const geoUrl = `https://geocoding.geo.census.gov/geocoder/locations/address?benchmark=Public_AR_Current&format=json&street=&city=&state=&zip=${zip}`;
    const geoRes = await fetch(geoUrl);
    if (!geoRes.ok) throw new Error('ZIP lookup failed.');
    const geoData = await geoRes.json();
    const matches = geoData.result?.addressMatches;
    if (!matches || matches.length === 0) { setError('ZIP code not found. Please try another.'); document.getElementById('status').classList.add('hidden'); return; }

    const { x: lon, y: lat } = matches[0].coordinates;
    // Try to get city/state from the match
    const addrComp = matches[0].addressComponents;
    const city = addrComp?.city || '';
    const state = addrComp?.state || '';
    const locationLabel = city && state ? `${city}, ${state} ${zip}` : zip;

    lastLat = lat; lastLon = lon; lastLocation = locationLabel;
    await loadForecast(lat, lon, locationLabel);
  } catch(err) {
    document.getElementById('status').textContent = 'Could not load forecast: ' + err.message;
  }
}

function refresh() {
  if (lastLat !== null) loadForecast(lastLat, lastLon, lastLocation);
  else goZip();
}

function toggleTemp() {
  if (!chartInst) return;
  const show = document.getElementById('show-temp').checked;
  chartInst.data.datasets[1].hidden = !show;
  chartInst.update();
}

async function loadForecast(lat, lon, locationLabel) {
  document.getElementById('status').textContent = 'Fetching NWS forecast…';
  document.getElementById('status').classList.remove('hidden');
  ['chart-wrap','table-wrap'].forEach(id => document.getElementById(id).classList.add('hidden'));

  try {
    const ptRes = await fetch(`https://api.weather.gov/points/${lat},${lon}`);
    if (!ptRes.ok) throw new Error(`NWS grid lookup failed (${ptRes.status})`);
    const ptData = await ptRes.json();
    const hourlyUrl = ptData.properties.forecastHourly;

    const fcRes = await fetch(hourlyUrl);
    if (!fcRes.ok) throw new Error(`Hourly forecast fetch failed (${fcRes.status})`);
    const fcData = await fcRes.json();

    const periods = fcData.properties.periods.slice(0, 168);

    const labels = [], dps = [], temps = [], rows = [];
    for (const p of periods) {
      if (!p.dewpoint) continue;
      const dp = p.dewpoint.unitCode === 'wmoUnit:degC'
        ? cToF(p.dewpoint.value) : Math.round(p.dewpoint.value);
      const temp = p.temperature != null
        ? (p.temperatureUnit === 'F' ? Math.round(p.temperature) : cToF(p.temperature))
        : null;
      const dt = new Date(p.startTime);
      const dayStr = dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
      const timeStr = dt.toLocaleTimeString('en-US', { hour: 'numeric', hour12: true });
      labels.push(dt.getHours() === 0 || labels.length === 0 ? dayStr : timeStr);
      dps.push(dp); temps.push(temp);
      rows.push({ dt, dayStr, timeStr, dp, temp });
    }

    if (!dps.length) throw new Error('No dewpoint data returned by NWS.');

    const allVals = [...dps, ...temps.filter(t => t !== null)];

    const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
    const lineColor  = isDark ? '#85B7EB' : '#185FA5';
    const fillColor  = isDark ? 'rgba(133,183,235,0.13)' : 'rgba(24,95,165,0.10)';
    const gridColor  = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.07)';
    const tickColor  = isDark ? '#6b7280' : '#9ca3af';
    const dayLineColor  = isDark ? 'rgba(255,255,255,0.25)' : 'rgba(0,0,0,0.22)';
    const dayLabelColor = isDark ? '#9099a8' : '#5a6070';
    const tempColor = isDark ? 'rgba(240,149,123,0.7)' : 'rgba(185,60,40,0.45)';

    document.getElementById('chart-wrap').classList.remove('hidden');

    const daySeparatorPlugin = {
      id: 'daySeparator',
      afterDraw(chart) {
        const { ctx, scales: { x, y } } = chart;
        const top = y.top, bottom = y.bottom;
        ctx.save();
        rows.forEach((r, i) => {
          if (r.dt.getHours() !== 0) return;
          const xPos = x.getPixelForValue(i);
          ctx.beginPath();
          ctx.moveTo(xPos, top); ctx.lineTo(xPos, bottom);
          ctx.strokeStyle = dayLineColor;
          ctx.lineWidth = 1.5; ctx.setLineDash([]); ctx.stroke();
          const lbl = r.dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
          ctx.font = '11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
          ctx.fillStyle = dayLabelColor;
          ctx.textAlign = 'left';
          ctx.fillText(lbl, xPos + 4, bottom + 14);
        });
        ctx.restore();
      }
    };

    if (chartInst) { chartInst.destroy(); chartInst = null; }
    const showTemp = document.getElementById('show-temp').checked;

    chartInst = new Chart(document.getElementById('chart'), {
      type: 'line',
      plugins: [daySeparatorPlugin],
      data: {
        labels,
        datasets: [
          {
            label: 'Dewpoint (°F)', data: dps,
            borderColor: lineColor, backgroundColor: fillColor,
            fill: true, pointRadius: 0, pointHoverRadius: 4,
            borderWidth: 2, tension: 0.35
          },
          {
            label: 'Temperature (°F)', data: temps,
            borderColor: tempColor, backgroundColor: 'transparent',
            fill: false, pointRadius: 0, pointHoverRadius: 4,
            borderWidth: 1.5, tension: 0.35, borderDash: [4, 3],
            hidden: !showTemp
          }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        layout: { padding: { bottom: 20 } },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              title: (items) => { const r = rows[items[0].dataIndex]; return r ? r.dayStr + ', ' + r.timeStr : ''; },
              label: (item) => {
                if (item.datasetIndex === 0) return ` Dewpoint: ${item.raw}°F — ${comfort(item.raw).label}`;
                if (!item.dataset.hidden) return ` Temperature: ${item.raw}°F`;
                return null;
              }
            }
          }
        },
        scales: {
          x: { ticks: { display: false }, grid: { color: gridColor } },
          y: {
            min: Math.max(0, Math.min(...allVals) - 8),
            max: Math.max(...allVals) + 8,
            ticks: { color: tickColor, font: { size: 11 }, callback: v => v + '°' },
            grid: { color: gridColor }
          }
        }
      }
    });

    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';
    const seen = new Set();
    for (const r of rows) {
      if (r.dt.getHours() % 3 !== 0) continue;
      const key = r.dayStr + r.dt.getHours();
      if (seen.has(key)) continue;
      seen.add(key);
      const c = comfort(r.dp);
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${r.dayStr}</td>
        <td style="color:var(--text2)">${r.timeStr}</td>
        <td style="font-weight:600">${r.dp}°F</td>
        <td><span class="badge" style="background:${c.bg};color:${c.color}">${c.label}</span></td>
      `;
      tbody.appendChild(tr);
    }

    document.getElementById('table-wrap').classList.remove('hidden');
    document.getElementById('status').classList.add('hidden');

    const now = new Date();
    document.getElementById('updated').textContent =
      `${locationLabel} · Updated ${now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })} · NOAA/NWS`;
    document.getElementById('footer-note').textContent =
      `Data: NOAA / National Weather Service · ${locationLabel}`;

  } catch(err) {
    document.getElementById('status').textContent = 'Could not load forecast: ' + err.message;
  }
}

// Load Sharon, MA on startup
(async () => {
  lastLat = 42.1237; lastLon = -71.1784; lastLocation = 'Sharon, MA 02067';
  await loadForecast(lastLat, lastLon, lastLocation);
})();
</script>
</body>
</html>
